<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Downtime Events</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

/* BODY SAME AS MAIN */
body{
  font-family:"Segoe UI";
  background:#eef2f7;
  padding:20px;
  color:#1e293b;
}

/* FILTER BAR (MAIN PAGE SAME) */
.filterBar{
  display:flex;
  justify-content:space-between;
  margin-bottom:20px;
}

.filters{
  display:flex;
  gap:10px;
  align-items:center;
}

/* INPUT + BUTTON SAME */
select{
  padding:8px 12px;
  border-radius:8px;
  border:1px solid #d1d5db;
}

.btn{
  background:#2563eb;
  color:#fff;
  padding:10px 16px;
  border-radius:8px;
  border:none;
  cursor:pointer;
  font-weight:500;
}

.btn:hover{
  background:#1d4ed8;
}

/* CARD SAME FEEL */
.card{
  background:#ffffff;
  border-radius:16px;
  padding:20px;
  box-shadow:0 8px 24px rgba(0,0,0,0.08);
}

/* TITLE */
.title{
  margin-bottom:12px;
  font-weight:600;
  color:#1e293b;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
  font-size:14px;
}

th, td{
  padding:10px;
  border-bottom:1px solid #e5e7eb;
  text-align:left;
}

th{
  background:#f1f5f9;
  font-weight:600;
  color:#475569;
}

/* PAGINATION */
.pagination{
  display:flex;
  justify-content:flex-end;
  margin-top:12px;
}

.pagination-right{
  display:flex;
  gap:8px;
  align-items:center;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.4);
  z-index:10;
}

.modal-box{
  background:#fff;
  width:420px;
  margin:8% auto;
  padding:20px;
  border-radius:10px;
}

.menu{
  cursor:pointer;
  float:right;
}
  .modal-box{
  background:#ffffff;
  width:420px;
  margin:6% auto;
  padding:24px;
  border-radius:14px;
  box-shadow:0 20px 60px rgba(0,0,0,0.15);
  animation:fadeIn 0.3s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

/* Label styling */
.modal-label{
  font-size:13px;
  color:#64748b;
  margin-bottom:4px;
  display:block;
  font-weight:500;
}

/* Dropdown modern */
.modal-select{
  width:100%;
  padding:10px 12px;
  border-radius:8px;
  border:1px solid #d1d5db;
  margin-bottom:14px;
  font-size:14px;
  transition:0.2s;
}

.modal-select:focus{
  border-color:#2563eb;
  outline:none;
  box-shadow:0 0 0 2px rgba(37,99,235,0.2);
}

/* Buttons row */
.modal-actions{
  display:flex;
  gap:10px;
  margin-top:10px;
}

/* Secondary button */
.btn-secondary{
  background:#e5e7eb;
  color:#111;
  border:none;
  padding:10px 14px;
  border-radius:8px;
  cursor:pointer;
}

</style>
</head>

<body>

<!-- 🔥 SAME FILTER BAR AS MAIN -->
<div class="filterBar">

  <div class="filters">

    <select id="range">
      <option value="24H">Today</option>
      <option value="WEEK">This Week</option>
    </select>

    <button class="btn" onclick="loadDowntime()">Generate</button>

  </div>

  <button class="btn" onclick="goToMain()">
    ← Back to Dashboard
  </button>

</div>

<!-- CARD -->
<div class="card">

  <div class="title">Downtime Events</div>

  <table>
    <thead>
      <tr>
        <th>Start Time</th>
        <th>End Time</th>
        <th>Duration (min)</th>
        <th>Downtime Description</th>
        <th>Downtime Type</th>
      </tr>
    </thead>
    <tbody id="tableBody">
      <tr><td colspan="5">Select range and click Generate</td></tr>
    </tbody>
  </table>

  <div class="pagination">
    <div class="pagination-right">

      <select id="pageSize" onchange="changePageSize()">
        <option value="10">10 rows</option>
        <option value="20">20 rows</option>
        <option value="20">30 rows</option>
      </select>

      <button class="btn" onclick="prevPage()">Prev</button>
      <span id="pageInfo">Page 1 of 1</span>
      <button class="btn" onclick="nextPage()">Next</button>

    </div>
  </div>

</div>

<!-- MODAL -->
<div id="editModal" class="modal">
  <div class="modal-box">

    <h3 style="margin-bottom:12px;">Edit Downtime Reason</h3>

    <p><b>Start:</b> <span id="mStart"></span></p>
    <p><b>End:</b> <span id="mEnd"></span></p>
    <p><b>Duration:</b> <span id="mDuration"></span> min</p>

    <!-- TYPE -->
    <label class="modal-label">Select Downtime Type</label>
    <select id="mType" class="modal-select" onchange="updateReasons()">
      <option value="Idle">Idle</option>
      <option value="Unexpected Downtime">Unexpected Downtime</option>
      <option value="Setup">Setup</option>
    </select>

    <!-- REASON -->
    <label class="modal-label">Select Downtime Reason</label>
    <select id="mReason" class="modal-select"></select>

    <!-- ACTION BUTTONS -->
    <div class="modal-actions">
      <button class="btn" onclick="submitUpdate()">Submit</button>
      <button class="btn-secondary" onclick="closeModal()">Cancel</button>
    </div>

  </div>
</div>

<!-- ONLY SCRIPT PART UPDATED BELOW -->
<script>

const reasonMap = {
  "Idle": ["Planned maintenance"],
  "Unexpected Downtime": [
    "Unplanned breakdown",
    "Material shortage",
    "Power failure",
    "Overheat cooldown"
  ],
  "Setup": [
    "Changeover / Setup",
    "Safety interlock opened",
    "Quality inspection hold",
    "Lubrication cycle",
    "Cleaning / 5S"
  ]
};

/* TOKEN */
let JWT = new URLSearchParams(location.search).get("token");
if(!JWT){
  try{ JWT = window.parent.localStorage.getItem("jwt_token"); }catch(e){}
}
if(!JWT){ JWT = localStorage.getItem("jwt"); }
if(JWT){ localStorage.setItem("jwt", JWT); }

/* CONFIG */
const API = "https://plantwiz.pimateck.in/api";
const DEVICE_ID = "991cf500-661a-11f0-90f1-775fee303094";
const KEYS = [
  "Downtime_Start_Time",
  "Downtime_End_Time",
  "Downtime_Duration",
  "Downtime_Description",
  "Downtime_Type"
];

let allRows = [];
let currentPage = 1;
let pageSize = 30;
let selectedTs = null;

/* HELPERS */
function fmtDate(v){
  if(!v) return "—";
  return new Date(v.replace(" ", "T")).toLocaleString();
}
function secToMin(v){
  return Math.round(Number(v||0)/60);
}

/* RANGE */
function getRange(){
  const type = range.value;
  const now = Date.now();

  if(type==="24H") return {startTs: now-86400000, endTs: now};

  const d=new Date();
  d.setHours(0,0,0,0);
  d.setDate(d.getDate()-d.getDay());
  return {startTs:d.getTime(), endTs:now};
}

/* LOAD */
async function loadDowntime(){
  const {startTs,endTs} = getRange();

  const url =
    `${API}/plugins/telemetry/DEVICE/${DEVICE_ID}/values/timeseries` +
    `?keys=${KEYS.join(",")}&startTs=${startTs}&endTs=${endTs}&limit=2000&agg=NONE`;

  const res = await fetch(url,{
    headers:{ "X-Authorization":"Bearer "+JWT }
  });

  const data = await res.json();

  const rows = {};
  Object.entries(data).forEach(([key,arr])=>{
    (arr||[]).forEach(p=>{
      rows[p.ts] = rows[p.ts] || {ts:p.ts};
      rows[p.ts][key] = p.value;
    });
  });

  allRows = Object.values(rows).sort((a,b)=>b.ts-a.ts);
  renderPage();
}

/* RENDER */
function renderPage(){
  tableBody.innerHTML="";

  const start=(currentPage-1)*pageSize;
  const pageRows=allRows.slice(start,start+pageSize);

  pageRows.forEach(r=>{
    tableBody.innerHTML+=`
      <tr>
        <td>${fmtDate(r.Downtime_Start_Time)}</td>
        <td>${fmtDate(r.Downtime_End_Time)}</td>
        <td>${secToMin(r.Downtime_Duration)}</td>
        <td>${r.Downtime_Description || "—"}</td>
        <td>
          ${r.Downtime_Type || "—"}
          <span class="menu" onclick='openModal(${JSON.stringify(r)})'>⋮</span>
        </td>
      </tr>
    `;
  });

  const totalPages=Math.max(1,Math.ceil(allRows.length/pageSize));
  pageInfo.textContent=`Page ${currentPage} of ${totalPages}`;
}

/* PAGINATION */
function nextPage(){
  const totalPages=Math.ceil(allRows.length/pageSize);
  if(currentPage<totalPages){ currentPage++; renderPage(); }
}
function prevPage(){
  if(currentPage>1){ currentPage--; renderPage(); }
}
function changePageSize(){
  pageSize=Number(pageSize);
  currentPage=1;
  renderPage();
}

/* 🔥 DYNAMIC REASON UPDATE */
function updateReasons(){
  const type = document.getElementById("mType").value;
  const reasonSelect = document.getElementById("mReason");

  reasonSelect.innerHTML = "";

  if(!reasonMap[type]) return;

  reasonMap[type].forEach(r=>{
    const opt = document.createElement("option");
    opt.value = r;
    opt.textContent = r;
    reasonSelect.appendChild(opt);
  });
}

/* MODAL */
function openModal(row){
  selectedTs = row.ts;

  mStart.textContent = fmtDate(row.Downtime_Start_Time);
  mEnd.textContent = fmtDate(row.Downtime_End_Time);
  mDuration.textContent = secToMin(row.Downtime_Duration);

  // 🔥 SET TYPE
  document.getElementById("mType").value = row.Downtime_Type || "";

  // 🔥 LOAD REASONS
  updateReasons();

  // 🔥 SET SELECTED REASON
  document.getElementById("mReason").value = row.Downtime_Description || "";

  editModal.style.display="block";
}

function closeModal(){
  editModal.style.display="none";
}

/* 🔥 UPDATE BOTH FIELDS */
async function submitUpdate(){

  const type = document.getElementById("mType").value;
  const reason = document.getElementById("mReason").value;

  const payload=[{
    ts:selectedTs,
    values:{
      Downtime_Description: reason,
      Downtime_Type: type
    }
  }];

  await fetch(`${API}/plugins/telemetry/DEVICE/${DEVICE_ID}/timeseries/ANY`,{
    method:"POST",
    headers:{
      "X-Authorization":"Bearer "+JWT,
      "Content-Type":"application/json"
    },
    body:JSON.stringify(payload)
  });

  closeModal();
  loadDowntime();
}

/* NAV */
function goToMain(){
  const params = window.location.search;
  window.location.href = "index.html" + params;
}

</script>

</body>
</html>
