<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Downtime Events</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  font-family: "Segoe UI", sans-serif;
  background: #f3f4f6;
  margin: 0;
  color: #1e293b;
}
.page {
  padding: 20px;
  margin-top:10px;
}
.card{
  background:#ffffff;
  border-radius:16px;
  padding:20px;
  box-shadow:0 6px 20px rgba(0,0,0,0.06);
}
h2 { margin: 0 0 14px; color: #1e3a8a; font-size: 18px; }

.filters {
  display: flex;
  gap: 12px;
  align-items: center;
  margin-bottom: 12px;
}

select, button {
  padding: 8px 12px;
  border-radius: 6px;
  border: 1px solid #cbd5e1;
  font-size: 14px;
}
button {
  background:#3b82f6;
  border-radius:8px;
  color: #fff;
  border: none;
  cursor: pointer;
  font-weight: 600;
}
button:hover { background: #1d4ed8; }

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}
th, td {
  padding: 10px;
  border-bottom: 1px solid #e5e7eb;
  text-align: left;
}
th {
  background:#f1f5f9;
  font-weight:600;
  color:#475569;
}
.menu { cursor: pointer; font-weight: bold; float: right; }

#status {
  font-size: 14px;
  color: #475569;
}

.pagination {
  display: flex;
  justify-content: flex-end;
  margin-top: 12px;
}
.pagination-right {
  display: flex;
  gap: 8px;
  align-items: center;
}

.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.4);
  z-index: 10;
}
.modal-box {
  background: #fff;
  width: 420px;
  margin: 8% auto;
  padding: 20px;
  border-radius: 10px;
}
</style>
</head>

<body>
<div style="
  background:#e5e7eb;
  padding:14px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
">

  <div style="display:flex; gap:10px; align-items:center;">
    <select id="range">
      <option value="24H">Today</option>
      <option value="WEEK">This Week</option>
    </select>

    <button onclick="loadDowntime()">Generate</button>
  </div>

  <button onclick="goToMain()" style="
    background:#2563eb;
    color:#fff;
    border:none;
    padding:8px 14px;
    border-radius:8px;
    font-weight:600;
    cursor:pointer;
  ">
    ← Back to Dashboard
  </button>

</div>
  
<div class="page">

<div class="card">
  <h3 style="
  margin-bottom:12px;
  font-weight:600;
  color:#1e293b;
">
  Downtime Events
</h3>
  <table>
    <thead>
      <tr>
        <th>Start Time</th>
        <th>End Time</th>
        <th>Duration (min)</th>
        <th>Downtime Description</th>
      </tr>
    </thead>
    <tbody id="tableBody">
      <tr><td colspan="4">Select range and click Generate</td></tr>
    </tbody>
  </table>

  <div class="pagination">
    <div class="pagination-right">
      <select id="pageSize" onchange="changePageSize()">
        <option value="10">10 rows</option>
        <option value="20">20 rows</option>
      </select>

      <button onclick="prevPage()">Prev</button>
      <span id="pageInfo">Page 1 of 1</span>
      <button onclick="nextPage()">Next</button>
    </div>
  </div>
</div>

</div>

<!-- MODAL -->
<div id="editModal" class="modal">
  <div class="modal-box">
    <h3>Edit Downtime Reason</h3>

    <p><b>Start:</b> <span id="mStart"></span></p>
    <p><b>End:</b> <span id="mEnd"></span></p>
    <p><b>Duration:</b> <span id="mDuration"></span> min</p>

    <select id="mReason" style="width:100%;margin:10px 0">
      <option>Power failure</option>
      <option>Planned maintenance</option>
      <option>Material shortage</option>
      <option>Changeover / Setup</option>
      <option>Lubrication cycle</option>
      <option>Quality inspection hold</option>
      <option>Unplanned breakdown</option>
      <option>Overheat cooldown</option>
      <option>Safety interlock opened</option>
      <option>Cleaning / 5S</option>
    </select>

    <button onclick="submitUpdate()">Submit</button>
    <button onclick="closeModal()" style="background:#e5e7eb;color:#000">Cancel</button>
  </div>
</div>

<script>

/* ================= TOKEN FIX ================= */

let JWT = new URLSearchParams(location.search).get("token");

// 👉 ThingsBoard iframe support
if(!JWT){
  try{
    JWT = window.parent.localStorage.getItem("jwt_token");
  }catch(e){}
}

// 👉 fallback
if(!JWT){
  JWT = localStorage.getItem("jwt");
}

// 👉 store for reuse
if(JWT){
  localStorage.setItem("jwt", JWT);
}else{
  console.error("Token not found");
  document.getElementById("status").textContent = "Token missing ❌";
}

/* ================= CONFIG ================= */
const API = "https://plantwiz.pimateck.in/api";
const DEVICE_ID = "991cf500-661a-11f0-90f1-775fee303094";
const KEYS = [
  "Downtime_Start_Time",
  "Downtime_End_Time",
  "Downtime_Duration",
  "Downtime_Description"
];

let allRows = [];
let currentPage = 1;
let pageSize = 10;
let selectedTs = null;

/* ================= HELPERS ================= */
function fmtDate(v){
  if(!v) return "—";
  return new Date(v.replace(" ", "T")).toLocaleString();
}
function secToMin(v){
  return Math.round(Number(v||0)/60);
}

/* ================= RANGE ================= */
function getRange(){
  const type = range.value;
  const now = Date.now();

  if(type==="24H") return {startTs: now-86400000, endTs: now};

  const d=new Date();
  d.setHours(0,0,0,0);
  d.setDate(d.getDate()-d.getDay());
  return {startTs:d.getTime(), endTs:now};
}

/* ================= LOAD ================= */
async function loadDowntime(){

  if(!JWT){
    status.textContent = "Token missing ❌";
    return;
  }

  status.textContent = "Loading...";

  const {startTs,endTs} = getRange();

  const url =
    `${API}/plugins/telemetry/DEVICE/${DEVICE_ID}/values/timeseries` +
    `?keys=${KEYS.join(",")}&startTs=${startTs}&endTs=${endTs}&limit=2000&agg=NONE`;

  const res = await fetch(url,{
    headers:{ "X-Authorization":"Bearer "+JWT }
  });

  const text = await res.text();

  let data;
  try{
    data = JSON.parse(text);
  }catch(e){
    console.error("API Error:", text);
    status.textContent = "API Error ❌";
    return;
  }

  const rows = {};
  Object.entries(data).forEach(([key,arr])=>{
    (arr||[]).forEach(p=>{
      rows[p.ts] = rows[p.ts] || {ts:p.ts};
      rows[p.ts][key] = p.value;
    });
  });

  allRows = Object.values(rows).sort((a,b)=>b.ts-a.ts);
  renderPage();

  status.textContent = "Loaded ✅";
}

/* ================= RENDER ================= */
function renderPage(){
  tableBody.innerHTML="";

  const start=(currentPage-1)*pageSize;
  const pageRows=allRows.slice(start,start+pageSize);

  pageRows.forEach(r=>{
    tableBody.innerHTML+=`
      <tr>
        <td>${fmtDate(r.Downtime_Start_Time)}</td>
        <td>${fmtDate(r.Downtime_End_Time)}</td>
        <td>${secToMin(r.Downtime_Duration)}</td>
        <td>
          ${r.Downtime_Description || "—"}
          <span class="menu" onclick='openModal(${JSON.stringify(r)})'>⋮</span>
        </td>
      </tr>
    `;
  });

  const totalPages=Math.max(1,Math.ceil(allRows.length/pageSize));
  pageInfo.textContent=`Page ${currentPage} of ${totalPages}`;
}

/* ================= PAGINATION ================= */
function nextPage(){
  const totalPages=Math.ceil(allRows.length/pageSize);
  if(currentPage<totalPages){ currentPage++; renderPage(); }
}
function prevPage(){
  if(currentPage>1){ currentPage--; renderPage(); }
}
function changePageSize(){
  pageSize=Number(document.getElementById("pageSize").value);
  currentPage=1;
  renderPage();
}

/* ================= MODAL ================= */
function openModal(row){
  selectedTs=row.ts;

  mStart.textContent=fmtDate(row.Downtime_Start_Time);
  mEnd.textContent=fmtDate(row.Downtime_End_Time);
  mDuration.textContent=secToMin(row.Downtime_Duration);
  mReason.value=row.Downtime_Description || "";

  editModal.style.display="block";
}
function closeModal(){
  editModal.style.display="none";
}

/* ================= UPDATE ================= */
async function submitUpdate(){

  const payload=[{
    ts:selectedTs,
    values:{ Downtime_Description:mReason.value }
  }];

  await fetch(`${API}/plugins/telemetry/DEVICE/${DEVICE_ID}/timeseries/ANY`,{
    method:"POST",
    headers:{
      "X-Authorization":"Bearer "+JWT,
      "Content-Type":"application/json"
    },
    body:JSON.stringify(payload)
  });

  closeModal();
  loadDowntime();
}
  function goToMain(){
  const params = window.location.search; // token preserve
  window.location.href = "index.html" + params;
}

</script>

</body>
</html>
