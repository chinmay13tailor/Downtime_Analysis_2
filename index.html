<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Downtime Dashboard</title>

<style>

body{
  font-family:"Segoe UI";
  background:#eef2f7;
  padding:20px;
}

/* FILTER BAR */
.filterBar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.filters{
  display:flex;
  gap:10px;
}

select{
  padding:8px 12px;
  border-radius:8px;
  border:1px solid #d1d5db;
  background:#fff;
  font-size:13px;
}

.btn{
  background:#2563eb;
  color:#fff;
  padding:10px 16px;
  border-radius:8px;
  border:none;
  font-weight:600;
  cursor:pointer;
}

/* KPI ROW */
.kpiRow{
  display:flex;
  gap:18px;
}

/* CARD */
.card{
  width:230px;
  background:#fff;
  border-radius:16px;
  padding:18px;
  box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

/* HEADER */
.kpiHeader{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:14px;
}

/* ICON */
.icon{
  width:40px;
  height:40px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:16px;
  color:#fff;
}

.icon.red{background:#ef4444}

/* TREND */
.trend{
  font-size:13px;
  font-weight:600;
  color:#22c55e;
}

/* TEXT */
.kpiTitle{
  font-size:13px;
  color:#6b7280;
}

.kpiValue{
  font-size:26px;
  font-weight:700;
  margin-top:6px;
}

.sub{
  font-size:12px;
  color:#9ca3af;
  margin-top:4px;
}

</style>
</head>

<body>

<!-- FILTER BAR -->
<div class="filterBar">

  <div class="filters">
    <select><option>Today</option></select>
    <select><option>All Shifts</option></select>
    <select><option>All Machines</option></select>
    <select><option>All Downtime Types</option></select>
  </div>

  <button class="btn">+ Add Downtime</button>

</div>

<!-- KPI ROW -->
<div class="kpiRow">

  <!-- KPI 1 -->
  <div class="card">

    <div class="kpiHeader">
      <div class="icon red">⏱</div>
      <div class="trend">↑</div>
    </div>

    <div class="kpiTitle">Total Downtime</div>

    <div class="kpiValue" id="kpi-total-downtime">-- mins</div>

    <div class="sub">vs yesterday</div>

  </div>

</div>

<script>

// ================= CONFIG =================
const API = "https://plantwiz.pimateck.in/api";
const DEVICE_ID = "991cf500-661a-11f0-90f1-775fee303094";
const JWT = new URLSearchParams(location.search).get("token");

// ================= DATE RANGE (TODAY ONLY) =================
function getTodayRange(){

  const now = new Date();

  const start = new Date();
  start.setHours(0,0,0,0);

  return {
    startTs: start.getTime(),
    endTs: now.getTime()
  };
}

// ================= FETCH =================
async function fetchData(){

  const {startTs, endTs} = getTodayRange();

  const url = `${API}/plugins/telemetry/DEVICE/${DEVICE_ID}/values/timeseries?keys=Downtime_Duration&startTs=${startTs}&endTs=${endTs}&limit=1000&agg=NONE`;

  const res = await fetch(url,{
    headers:{
      "X-Authorization": `Bearer ${JWT}`
    }
  });

  return res.json();
}

// ================= CALCULATION =================
function calculateTotalDowntime(data){

  let total = 0;

  (data.Downtime_Duration || []).forEach(d=>{
    total += Number(d.value || 0) / 60;
  });

  return total.toFixed(0);
}

// ================= MAIN =================
async function init(){

  if(!JWT){
    alert("Token missing in URL");
    return;
  }

  const raw = await fetchData();

  console.log("RAW DATA:", raw.Downtime_Duration);

  const total = calculateTotalDowntime(raw);

  document.getElementById("kpi-total-downtime").innerText =
    total + " mins";
}

init();

</script>

</body>
</html>
