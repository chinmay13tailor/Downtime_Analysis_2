<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Downtime Dashboard</title>

<style>
body{
  font-family:"Segoe UI";
  background:#eef2f7;
  padding:20px;
}

.filterBar{
  display:flex;
  justify-content:space-between;
  margin-bottom:20px;
}

.filters{
  display:flex;
  gap:10px;
  align-items:center;
}

select, input{
  padding:8px 12px;
  border-radius:8px;
  border:1px solid #d1d5db;
}

.btn{
  background:#2563eb;
  color:#fff;
  padding:10px 16px;
  border-radius:8px;
  border:none;
  cursor:pointer;
}

.kpiRow{
  display:flex;
  gap:18px;
}

.card{
  width:220px;
  background:#fff;
  border-radius:16px;
  padding:18px;
  box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

.kpiTitle{font-size:12px;color:#6b7280}
.kpiValue{font-size:22px;font-weight:700;margin-top:5px}
.sub{font-size:11px;color:#9ca3af}
</style>
</head>

<body>

<div class="filterBar">
  <div class="filters">
    <select id="dateType" onchange="handleDateType()">
      <option value="today">Today</option>
      <option value="yesterday">Yesterday</option>
      <option value="custom">Custom</option>
    </select>

    <input type="date" id="customDate" style="display:none">

    <button class="btn" onclick="generate()">Generate</button>
  </div>

  <button class="btn">+ Add Downtime</button>
</div>

<div class="kpiRow">

  <div class="card">
    <div class="kpiTitle">Total Downtime</div>
    <div class="kpiValue" id="kpi-total">--</div>
    <div class="sub">mins</div>
  </div>

  <div class="card">
    <div class="kpiTitle">Downtime %</div>
    <div class="kpiValue" id="kpi-percent">--</div>
    <div class="sub">%</div>
  </div>

  <div class="card">
    <div class="kpiTitle">Production Loss</div>
    <div class="kpiValue" id="kpi-prod">--</div>
    <div class="sub">nos</div>
  </div>

  <div class="card">
    <div class="kpiTitle">Energy Loss</div>
    <div class="kpiValue" id="kpi-energy">--</div>
    <div class="sub">kWh</div>
  </div>

  <div class="card">
    <div class="kpiTitle">Top Reason</div>
    <div class="kpiValue" id="kpi-reason">--</div>
  </div>

  <div class="card">
    <div class="kpiTitle">MTTR</div>
    <div class="kpiValue" id="kpi-mttr">--</div>
    <div class="sub">mins</div>
  </div>

  <div class="card">
    <div class="kpiTitle">MTBF</div>
    <div class="kpiValue" id="kpi-mtbf">--</div>
    <div class="sub">mins</div>
  </div>

</div>

<script>

const API = "https://plantwiz.pimateck.in/api";
const DEVICE_ID = "991cf500-661a-11f0-90f1-775fee303094";
const JWT = new URLSearchParams(location.search).get("token");

function handleDateType(){
  const type = document.getElementById("dateType").value;
  document.getElementById("customDate").style.display =
    type === "custom" ? "block" : "none";
}

function getRange(){

  const type = document.getElementById("dateType").value;

  let start, end;

  if(type === "today"){
    start = new Date();
    start.setHours(0,0,0,0);
    end = new Date();
  }

  else if(type === "yesterday"){
    start = new Date();
    start.setDate(start.getDate()-1);
    start.setHours(0,0,0,0);

    end = new Date(start);
    end.setHours(23,59,59,999);
  }

  else{
    const val = document.getElementById("customDate").value;
    if(!val){ alert("Select date"); return null; }

    start = new Date(val);
    start.setHours(0,0,0,0);

    end = new Date(val);
    end.setHours(23,59,59,999);
  }

  return {startTs:start.getTime(), endTs:end.getTime()};
}

async function fetchData(startTs,endTs){

  const url = `${API}/plugins/telemetry/DEVICE/${DEVICE_ID}/values/timeseries?keys=Downtime_Duration,Downtime_Description,Standard_Speed,Per_Min_Consumption&startTs=${startTs}&endTs=${endTs}&limit=1000&agg=NONE`;

  const res = await fetch(url,{
    headers:{
      "X-Authorization": `Bearer ${JWT}`
    }
  });

  return res.json();
}

function calculateAll(data){

  let total=0, prod=0, energy=0, count=0, reasonMap={};

  const d = data.Downtime_Duration || [];
  const r = data.Downtime_Description || [];
  const s = data.Standard_Speed || [];
  const e = data.Per_Min_Consumption || [];

  d.forEach((val,i)=>{
    const min = Number(val.value)/60;

    total += min;
    count++;

    const speed = Number(s[i]?.value || 0);
    const en = Number(e[i]?.value || 0);
    const reason = (r[i]?.value || "Unknown").trim();

    prod += min * speed;
    energy += min * en;

    reasonMap[reason] = (reasonMap[reason]||0) + min;
  });

  // 🔥 UPDATED LOGIC
  let availableMinutes = 1440;

  const type = document.getElementById("dateType").value;

  if(type === "today"){
    const now = new Date();
    availableMinutes = now.getHours()*60 + now.getMinutes();
  }

  const percent = availableMinutes > 0
    ? (total / availableMinutes) * 100
    : 0;

  const topReason = Object.keys(reasonMap)
    .reduce((a,b)=> reasonMap[a] > reasonMap[b] ? a : b , "-");

  const mttr = count ? total/count : 0;
  const mtbf = count ? 1440/count : 0;

  return {
    total: total.toFixed(0),
    percent: percent.toFixed(1),
    prod: prod.toFixed(0),
    energy: energy.toFixed(0),
    topReason,
    mttr: mttr.toFixed(1),
    mtbf: mtbf.toFixed(0)
  };
}

async function generate(){

  if(!JWT){
    alert("Token missing");
    return;
  }

  const range = getRange();
  if(!range) return;

  const raw = await fetchData(range.startTs, range.endTs);

  const kpi = calculateAll(raw);

  document.getElementById("kpi-total").innerText = kpi.total;
  document.getElementById("kpi-percent").innerText = kpi.percent;
  document.getElementById("kpi-prod").innerText = kpi.prod;
  document.getElementById("kpi-energy").innerText = kpi.energy;
  document.getElementById("kpi-reason").innerText = kpi.topReason;
  document.getElementById("kpi-mttr").innerText = kpi.mttr;
  document.getElementById("kpi-mtbf").innerText = kpi.mtbf;
}

</script>

</body>
</html>
