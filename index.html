<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Downtime KPI</title>

<style>
body{
  font-family:"Segoe UI";
  background:#eef2f7;
  padding:20px;
}

/* KPI CARD (same style as your UI) */
.kpiRow{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:12px;
}

.card{
  background:#fff;
  border-radius:12px;
  padding:15px;
  box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

.kpiTitle{
  font-size:12px;
  color:#6b7280;
}

.kpiValue{
  font-size:22px;
  font-weight:600;
  margin-top:5px;
}

.sub{
  font-size:11px;
  color:#9ca3af;
}
</style>
</head>

<body>

<!-- KPI ROW -->
<div class="kpiRow">

  <!-- ONLY FIRST CARD (FREEZE TARGET) -->
  <div class="card">
    <div class="kpiTitle">Total Downtime</div>
    <div class="kpiValue" id="kpi-total-downtime">-- mins</div>
    <div class="sub">live</div>
  </div>

</div>

<script>

// ================= CONFIG =================
const API = "https://plantwiz.pimateck.in/api";
const DEVICE_ID = "991cf500-661a-11f0-90f1-775fee303094";
const JWT = new URLSearchParams(location.search).get("token");

// ================= FETCH =================
async function fetchData(){

  const now = Date.now();
  const start = now - (24*60*60*1000); // last 24 hrs

  const url = `${API}/plugins/telemetry/DEVICE/${DEVICE_ID}/values/timeseries?keys=Downtime_Start_Time,Downtime_End_Time,Downtime_Description,Downtime_Duration&startTs=${start}&endTs=${now}&limit=1000&agg=NONE`;

  const res = await fetch(url,{
    headers:{
      "X-Authorization": `Bearer ${JWT}`
    }
  });

  return res.json();
}

// ================= MERGE =================
function merge(data){

  const map = new Map();

  Object.keys(data).forEach(key=>{
    (data[key] || []).forEach(d=>{

      const ts = d.ts;

      if(!map.has(ts)){
        map.set(ts,{});
      }

      map.get(ts)[key] = d.value;
    });
  });

  return Array.from(map.values());
}

// ================= EVENTS =================
function buildEvents(rows){

  return rows
    .filter(r => r.Downtime_Duration) // only valid rows
    .map(r=>{

      const durationMin = Number(r.Downtime_Duration) / 60;

      return {
        duration: durationMin
      };

    });

}

// ================= KPI =================
function renderTotalDowntime(events){

  let total = 0;

  events.forEach(e=>{
    total += e.duration;
  });

  total = total.toFixed(0);

  document.getElementById("kpi-total-downtime").innerText = total + " mins";
}

// ================= MAIN =================
async function init(){

  if(!JWT){
    alert("Token missing in URL");
    return;
  }

  const raw = await fetchData();

  console.log("RAW:", raw);

  const rows = merge(raw);

  console.log("MERGED:", rows);

  const events = buildEvents(rows);

  console.log("EVENTS:", events);

  renderTotalDowntime(events);
}

init();

</script>

</body>
</html>
