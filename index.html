<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Downtime Analytics</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:"Segoe UI";background:#eef2f7;margin:0;padding:20px}
.card{background:#fff;border-radius:12px;padding:15px;margin-bottom:15px;box-shadow:0 2px 6px rgba(0,0,0,.08)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:15px}
.kpiRow{display:grid;grid-template-columns:repeat(7,1fr);gap:10px;margin-bottom:15px}

/* GANTT */
#gantt{position:relative;height:60px;background:#e5e7eb;border-radius:8px}
.bar{position:absolute;height:100%;border-radius:6px;background:#ef4444;color:#fff;font-size:10px;display:flex;align-items:center;justify-content:center}

/* HEATMAP */
.heatmap{display:grid;grid-template-columns:50px repeat(24,1fr);gap:2px}
.cell{height:14px;background:#f1f5f9}
.l1{background:#fecaca}
.l2{background:#f87171}
.l3{background:#ef4444}

</style>
</head>

<body>

<div class="kpiRow" id="kpis"></div>

<div class="grid">
<div class="card">
<h4>Downtime Timeline</h4>
<div id="gantt"></div>
</div>

<div class="card">
<h4>Heatmap</h4>
<div id="heatmap" class="heatmap"></div>
</div>
</div>

<div class="grid">
<div class="card"><canvas id="pareto"></canvas></div>
<div class="card"><canvas id="loss"></canvas></div>
</div>

<script>

const API = "https://plantwiz.pimateck.in/api";
const DEVICE_ID = "991cf500-661a-11f0-90f1-775fee303094";
const JWT = new URLSearchParams(location.search).get("token");

// ================= FETCH =================
async function fetchData(){
 const now = Date.now();
 const start = now - (24*60*60*1000);

 const url = `${API}/plugins/telemetry/DEVICE/${DEVICE_ID}/values/timeseries?keys=Downtime_Start_Time,Downtime_End_Time,Downtime_Description,Downtime_Duration,Standard_Speed,Per_Min_Consumption&startTs=${start}&endTs=${now}&limit=1000&agg=NONE`;

 const res = await fetch(url,{
   headers:{"X-Authorization":`Bearer ${JWT}`}
 });

 return res.json();
}

// ================= MERGE =================
function merge(data){
 const map = new Map();

 Object.keys(data).forEach(k=>{
  (data[k]||[]).forEach(d=>{
   if(!map.has(d.ts)) map.set(d.ts,{});
   map.get(d.ts)[k]=d.value;
  });
 });

 return Array.from(map.values());
}

// ================= EVENTS =================
function buildEvents(rows){
 return rows.map(r=>{

  const start = new Date(r.Downtime_Start_Time).getTime();
  const end = new Date(r.Downtime_End_Time).getTime();

  const min = (r.Downtime_Duration||0)/60;

  return{
   start,end,
   reason:r.Downtime_Description||"Unknown",
   duration:min,
   production:min*(r.Standard_Speed||0),
   energy:min*(r.Per_Min_Consumption||0)
  };

 }).filter(e=>e.start && e.end);
}

// ================= KPI =================
function renderKPI(events){

 let total=0,prod=0,energy=0,map={};

 events.forEach(e=>{
  total+=e.duration;
  prod+=e.production;
  energy+=e.energy;
  map[e.reason]=(map[e.reason]||0)+e.duration;
 });

 const top = Object.keys(map).reduce((a,b)=>map[a]>map[b]?a:b,"-");

 document.getElementById("kpis").innerHTML=`
 <div class="card">Downtime<br>${total.toFixed(1)} min</div>
 <div class="card">Production Loss<br>${prod.toFixed(0)}</div>
 <div class="card">Energy Loss<br>${energy.toFixed(0)}</div>
 <div class="card">Top Reason<br>${top}</div>
 `;
}

// ================= GANTT =================
function renderGantt(events){

 const g = document.getElementById("gantt");
 g.innerHTML="";

 const dayStart = new Date().setHours(0,0,0,0);
 const total = 24*60*60*1000;

 events.forEach(e=>{

  const left = ((e.start-dayStart)/total)*100;
  const width = ((e.end-e.start)/total)*100;

  const div = document.createElement("div");
  div.className="bar";
  div.style.left=left+"%";
  div.style.width=width+"%";
  div.innerText=Math.round(e.duration)+"m";

  g.appendChild(div);
 });
}

// ================= HEATMAP =================
function renderHeatmap(events){

 const heat = Array(7).fill().map(()=>Array(24).fill(0));

 events.forEach(e=>{
  const d=new Date(e.start);
  heat[d.getDay()][d.getHours()]+=e.duration;
 });

 const el = document.getElementById("heatmap");
 el.innerHTML="";

 heat.forEach(row=>{
  row.forEach(v=>{
   let c="cell";
   if(v>30)c+=" l3"; else if(v>10)c+=" l2"; else if(v>0)c+=" l1";
   el.innerHTML+=`<div class="${c}"></div>`;
  });
 });
}

// ================= PARETO =================
function renderPareto(events){

 const map={};
 events.forEach(e=> map[e.reason]=(map[e.reason]||0)+e.duration);

 const labels=Object.keys(map);
 const values=Object.values(map);

 new Chart(document.getElementById("pareto"),{
  type:"bar",
  data:{labels,datasets:[{data:values,backgroundColor:"#2563eb"}]}
 });
}

// ================= LOSS =================
function renderLoss(events){

 const map={};

 events.forEach(e=>{
  if(!map[e.reason]) map[e.reason]={p:0,e:0};
  map[e.reason].p+=e.production;
  map[e.reason].e+=e.energy;
 });

 const labels=Object.keys(map);

 new Chart(document.getElementById("loss"),{
  type:"bar",
  data:{
   labels,
   datasets:[
    {label:"Production",data:labels.map(l=>map[l].p),backgroundColor:"#2563eb"},
    {label:"Energy",data:labels.map(l=>map[l].e),backgroundColor:"#f59e0b"}
   ]
  }
 });
}

// ================= MAIN =================
async function init(){

 if(!JWT){
  alert("Token missing in URL");
  return;
 }

 const raw = await fetchData();
 const rows = merge(raw);
 const events = buildEvents(rows);

 if(events.length===0){
  document.body.innerHTML="<h2>No Data Available</h2>";
  return;
 }

 renderKPI(events);
 renderGantt(events);
 renderHeatmap(events);
 renderPareto(events);
 renderLoss(events);
}

init();

</script>

</body>
</html>
