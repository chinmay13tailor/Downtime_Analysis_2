<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Downtime Dashboard</title>

<style>
body{
  font-family:"Segoe UI";
  background:#eef2f7;
  padding:20px;
}

/* FILTER BAR */
.filterBar{
  display:flex;
  justify-content:space-between;
  margin-bottom:20px;
}

.filters{
  display:flex;
  gap:10px;
  align-items:center;
}

select, input{
  padding:8px 12px;
  border-radius:8px;
  border:1px solid #d1d5db;
  background:#fff;
}

.btn{
  background:#2563eb;
  color:#fff;
  padding:10px 16px;
  border-radius:8px;
  border:none;
  cursor:pointer;
}

/* KPI */
.kpiRow{
  display:flex;
  gap:18px;
}

.card{
  width:220px;
  background:#fff;
  border-radius:16px;
  padding:18px;
  box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

.kpiTitle{font-size:12px;color:#6b7280}
.kpiValue{font-size:22px;font-weight:700;margin-top:5px}
</style>
</head>

<body>

<!-- FILTER -->
<div class="filterBar">

  <div class="filters">

    <select id="dateType" onchange="handleDateType()">
      <option value="today">Today</option>
      <option value="yesterday">Yesterday</option>
      <option value="custom">Custom</option>
    </select>

    <input type="date" id="customDate" style="display:none">

    <button class="btn" onclick="generate()">Generate</button>

  </div>

  <button class="btn">+ Add Downtime</button>

</div>

<!-- KPI -->
<div class="kpiRow">

  <div class="card">
    <div class="kpiTitle">Total Downtime</div>
    <div class="kpiValue" id="kpi-total">--</div>
  </div>

</div>

<script>

// CONFIG
const API = "https://plantwiz.pimateck.in/api";
const DEVICE_ID = "991cf500-661a-11f0-90f1-775fee303094";
const JWT = new URLSearchParams(location.search).get("token");

// HANDLE DATE TYPE
function handleDateType(){
  const type = document.getElementById("dateType").value;
  document.getElementById("customDate").style.display =
    type === "custom" ? "block" : "none";
}

// GET DATE RANGE
function getRange(){

  const type = document.getElementById("dateType").value;

  let start, end;

  if(type === "today"){
    start = new Date();
    start.setHours(0,0,0,0);
    end = new Date();
  }

  else if(type === "yesterday"){
    start = new Date();
    start.setDate(start.getDate() - 1);
    start.setHours(0,0,0,0);

    end = new Date(start);
    end.setHours(23,59,59,999);
  }

  else{
    const val = document.getElementById("customDate").value;

    if(!val){
      alert("Select date");
      return null;
    }

    start = new Date(val);
    start.setHours(0,0,0,0);

    end = new Date(val);
    end.setHours(23,59,59,999);
  }

  return {
    startTs: start.getTime(),
    endTs: end.getTime()
  };
}

// FETCH
async function fetchData(startTs,endTs){

  const url = `${API}/plugins/telemetry/DEVICE/${DEVICE_ID}/values/timeseries?keys=Downtime_Duration&startTs=${startTs}&endTs=${endTs}&limit=1000&agg=NONE`;

  const res = await fetch(url,{
    headers:{
      "X-Authorization": `Bearer ${JWT}`
    }
  });

  return res.json();
}

// CALC
function calc(data){
  let total = 0;
  (data.Downtime_Duration || []).forEach(d=>{
    total += Number(d.value)/60;
  });
  return total.toFixed(0);
}

// GENERATE
async function generate(){

  if(!JWT){
    alert("Token missing");
    return;
  }

  const range = getRange();
  if(!range) return;

  const raw = await fetchData(range.startTs, range.endTs);

  console.log("RAW:", raw);

  const total = calc(raw);

  document.getElementById("kpi-total").innerText = total + " mins";
}

</script>

</body>
</html>
